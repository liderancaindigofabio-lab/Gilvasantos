<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Gilva Santos Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --rose-gold: #e5b3a3; --rose-dark: #b58373; --black: #1a1a1a; --white: #ffffff; --bg-light: #f9f4f2; --success: #88a070; --danger: #e57373; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-light); color: var(--black); }
        .sidebar { position: fixed; width: 250px; height: 100vh; background: var(--black); color: var(--white); padding: 30px 20px; z-index: 100; }
        .logo-area { text-align: center; margin-bottom: 50px; }
        .logo-area h2 { font-family: 'Playfair Display', serif; color: var(--rose-gold); font-size: 1.2rem; border-bottom: 1px solid var(--rose-dark); padding-bottom: 10px; }
        .nav-links { list-style: none; }
        .nav-links li { padding: 15px; cursor: pointer; transition: 0.3s; border-radius: 5px; margin-bottom: 5px; display: flex; align-items: center; }
        .nav-links li:hover, .nav-links li.active { background: var(--rose-gold); color: var(--black); font-weight: 600; }
        .main { margin-left: 250px; padding: 40px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--rose-gold); }
        .table-container { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; border-bottom: 2px solid var(--bg-light); color: var(--rose-dark); text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid var(--bg-light); font-size: 0.9rem; }
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-pago { background: #e8f5e9; color: #2e7d32; }
        .status-pendente { background: #fff3e0; color: #ef6c00; }
        .btn-action { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; background: var(--black); color: white; font-weight: 600; margin-right: 5px; }
        .btn-danger { background: var(--danger); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar h2, .nav-links span { display: none; } .main { margin-left: 70px; } }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('gilva_auth') !== 'true') window.location.href = 'index.html';
        const SUPABASE_URL = 'https://phfeoylssuvylsfbigui.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_M4l09uV5ekIgyAJVapAozA_oXS75600';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <div class="sidebar">
        <div class="logo-area"><h2>GILVA SANTOS</h2></div>
        <ul class="nav-links">
            <li class="active" onclick="showTab('agendamentos', this)">📅 <span>Agenda</span></li>
            <li onclick="showTab('clientes', this)">👤 <span>Clientes</span></li>
            <li onclick="showTab('financeiro', this)">💰 <span>Financeiro</span></li>
            <li onclick="localStorage.removeItem('gilva_auth'); window.location.href='index.html'">🚪 <span>Sair</span></li>
        </ul>
    </div>
    <div class="main">
        <div id="agendamentos" class="tab-content active">
            <header><h1>Agenda</h1><button class="btn-action" style="background: var(--rose-gold); color: black;" onclick="openModal('modalAgendamento')">+ Novo</button></header>
            <div class="stats-grid">
                <div class="stat-card"><h3>Atendimentos</h3><p id="stat-count">0</p></div>
                <div class="stat-card"><h3>A Receber</h3><p id="stat-receber">R$ 0,00</p></div>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Cliente</th><th>Serviço</th><th>Data/Hora</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="lista-agendamentos"></tbody>
                </table>
            </div>
        </div>
        <div id="clientes" class="tab-content">
            <header><h1>Clientes</h1></header>
            <div class="table-container"><table><thead><tr><th>Nome</th><th>WhatsApp</th><th>Total Gasto</th><th>Ações</th></tr></thead><tbody id="lista-clientes"></tbody></table></div>
        </div>
        <div id="financeiro" class="tab-content">
            <header><h1>Financeiro</h1></header>
            <div class="stat-card" style="margin-bottom:20px"><h3>Total Recebido</h3><p id="total-recebido">R$ 0,00</p></div>
            <div class="table-container"><table><thead><tr><th>Data</th><th>Cliente</th><th>Valor</th></tr></thead><tbody id="lista-financeiro"></tbody></table></div>
        </div>
    </div>
    <div id="modalAgendamento" class="modal"><div class="modal-content"><h2>Novo Agendamento</h2><br>
        <div class="form-group"><label>Nome</label><input type="text" id="ag-nome"></div>
        <div class="form-group"><label>WhatsApp</label><input type="tel" id="ag-whatsapp"></div>
        <div class="form-group"><label>Serviço</label><select id="ag-servico">
            <option value="35">Design Simples - R$ 35</option><option value="45">Design com Hena - R$ 45</option><option value="30">Manutenção de Micro - R$ 30</option>
        </select></div>
        <div class="form-group"><label>Data/Hora</label><input type="datetime-local" id="ag-data"></div>
        <button class="btn-action" style="width:100%" onclick="salvarAgendamento()">Salvar</button>
        <button onclick="closeModal('modalAgendamento')" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer">Cancelar</button>
    </div></div>
    <script>
        async function load() {
            try {
                const { data: ags, error } = await _supabase.from('agendamentos').select('*, clientes(nome)').order('data_hora', { ascending: true });
                if (error) throw error;
                renderAgendamentos(ags || []);
            } catch (e) { console.error(e); }
        }
        function showTab(id, el) { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
            el.classList.add('active');
            if(id === 'clientes') renderClientes();
            if(id === 'financeiro') renderFinanceiro();
            if(id === 'agendamentos') load();
        }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        async function salvarAgendamento() {
            const nome = document.getElementById('ag-nome').value, zap = document.getElementById('ag-whatsapp').value, data = document.getElementById('ag-data').value, s = document.getElementById('ag-servico');
            if(!nome || !zap || !data) return alert('Preencha tudo');
            try {
                await _supabase.from('clientes').upsert({ whatsapp: zap, nome: nome }, { onConflict: 'whatsapp' });
                await _supabase.from('agendamentos').insert({ cliente_zap: zap, servico: s.options[s.selectedIndex].text.split(' - ')[0], valor: parseFloat(s.value), data_hora: data });
                closeModal('modalAgendamento'); load();
            } catch(e) { alert('Erro: ' + e.message); }
        }
        
        function renderAgendamentos(ags) {
            const l = document.getElementById('lista-agendamentos'); l.innerHTML = ''; let rec = 0;
            ags.forEach(a => {
                if(a.status === 'Pendente') rec += a.valor;
                const dataF = new Date(a.data_hora).toLocaleString('pt-BR');
                const nomeExibicao = a.clientes ? a.clientes.nome : a.cliente_zap;
                l.innerHTML += `<tr>
                    <td><strong>${nomeExibicao}</strong><br><small>${a.cliente_zap}</small></td>
                    <td>${a.servico}</td>
                    <td>${dataF}</td>
                    <td>R$ ${a.valor}</td>
                    <td><span class="status-pill ${a.status==='Pago'?'status-pago':'status-pendente'}">${a.status}</span></td>
                    <td>
                        ${a.status==='Pendente'?`<button class="btn-action" onclick="pagar('${a.id}')">Pagar</button>`:'OK'}
                        <button class="btn-action btn-danger" onclick="excluirAgendamento('${a.id}')">Excluir</button>
                    </td>
                </tr>`;
            });
            document.getElementById('stat-count').innerText = ags.length;
            document.getElementById('stat-receber').innerText = `R$ ${rec.toFixed(2)}`;
        }
        
        async function excluirAgendamento(id) {
            if(!confirm('Tem certeza que deseja excluir este agendamento?')) return;
            await _supabase.from('agendamentos').delete().eq('id', id);
            load();
        }

        async function excluirCliente(whatsapp) {
            if(!confirm('Ao excluir o cliente, todos os agendamentos dele também serão apagados. Continuar?')) return;
            await _supabase.from('agendamentos').delete().eq('cliente_zap', whatsapp);
            await _supabase.from('clientes').delete().eq('whatsapp', whatsapp);
            renderClientes();
        }

        async function pagar(id) {
            const { data: ag } = await _supabase.from('agendamentos').select('*').eq('id', id).single();
            await _supabase.from('agendamentos').update({ status: 'Pago' }).eq('id', id);
            const { data: cl } = await _supabase.from('clientes').select('total_gasto').eq('whatsapp', ag.cliente_zap).single();
            await _supabase.from('clientes').update({ total_gasto: (parseFloat(cl.total_gasto) || 0) + parseFloat(ag.valor) }).eq('whatsapp', ag.cliente_zap);
            load();
        }
        
        async function renderClientes() {
            const { data: cls } = await _supabase.from('clientes').select('*');
            const l = document.getElementById('lista-clientes'); l.innerHTML = '';
            cls.forEach(c => l.innerHTML += `<tr>
                <td>${c.nome || 'Sem nome'}</td>
                <td>${c.whatsapp}</td>
                <td>R$ ${parseFloat(c.total_gasto || 0).toFixed(2)}</td>
                <td><button class="btn-action btn-danger" onclick="excluirCliente('${c.whatsapp}')">Excluir</button></td>
            </tr>`);
        }
        
        async function renderFinanceiro() {
            const { data: ags } = await _supabase.from('agendamentos').select('*, clientes(nome)').eq('status', 'Pago');
            const l = document.getElementById('lista-financeiro'); l.innerHTML = ''; let t = 0;
            ags.forEach(p => { 
                t += parseFloat(p.valor); 
                const nomeExibicao = p.clientes ? p.clientes.nome : p.cliente_zap;
                l.innerHTML += `<tr><td>${new Date(p.data_hora).toLocaleDateString('pt-BR')}</td><td>${nomeExibicao}</td><td>R$ ${parseFloat(p.valor).toFixed(2)}</td></tr>`; 
            });
            document.getElementById('total-recebido').innerText = `R$ ${t.toFixed(2)}`;
        }
        load();
    </script>
</body>
</html>
